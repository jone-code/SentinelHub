# Coturn config for SentinelHub remote assist (TURN REST / time-limited credentials)
# Set TURN_STATIC_AUTH_SECRET to match backend REMOTE_TURN_SECRET.

listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech
use-auth-secret
# static-auth-secret passed via docker compose command (--static-auth-secret)

realm=sentinelhub
server-name=sentinelhub-turn

no-cli
no-loopback-peers
no-multicast-peers

# Uncomment and set when coturn is behind NAT (public IP or 1:1 NAT mapping)
# external-ip=PUBLIC_IP/INTERNAL_IP

# Relay port range (open in firewall when using non-host networking)
min-port=49152
max-port=49252

verbose
