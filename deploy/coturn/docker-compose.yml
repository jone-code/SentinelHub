services:
  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49252:49152-49252/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET:-change-me-turn-secret}
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --static-auth-secret=${TURN_STATIC_AUTH_SECRET:-change-me-turn-secret}
