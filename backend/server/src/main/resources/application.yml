server:
  port: 8080

spring:
  application:
    name: sentinelhub-server
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sentinelhub}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:sentinel}
    password: ${DB_PASSWORD:sentinel}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: sentinelhub-server

sentinelhub:
  instance-id: ${SENTINEL_INSTANCE_ID:}
  api:
    admin-prefix: /api/admin/v1
    app-prefix: /api/app/v1
    client-prefix: /api/client/v1
  jwt:
    secret: ${JWT_SECRET:sentinelhub-dev-secret-change-in-production-32bytes!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${SEED_ADMIN_EMAIL:admin@demo.local}
    admin-password: ${SEED_ADMIN_PASSWORD:admin123}
    tenant-slug: ${SEED_TENANT_SLUG:demo}
    registration-token: ${SEED_REGISTRATION_TOKEN:demo-token}
  minio:
    enabled: ${MINIO_ENABLED:true}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:sentinel}
    secret-key: ${MINIO_SECRET_KEY:sentinel123}
    bucket: ${MINIO_DLP_BUCKET:sentinel-dlp-evidence}
    region: ${MINIO_REGION:us-east-1}
  ai:
    llm:
      enabled: ${AI_LLM_ENABLED:false}
      base-url: ${AI_LLM_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_LLM_API_KEY:}
      model: ${AI_LLM_MODEL:gpt-4o-mini}
  remote:
    rtc:
      stun-servers:
        - stun:stun.l.google.com:19302
      turn-url: ${REMOTE_TURN_URL:}
      turn-username: ${REMOTE_TURN_USERNAME:}
      turn-credential: ${REMOTE_TURN_CREDENTIAL:}
      turn-secret: ${REMOTE_TURN_SECRET:}
      turn-credential-ttl-seconds: ${REMOTE_TURN_CREDENTIAL_TTL:86400}
  audit:
    clickhouse:
      enabled: ${AUDIT_CH_ENABLED:false}
      url: ${AUDIT_CH_URL:http://localhost:8123}
      database: ${AUDIT_CH_DATABASE:sentinelhub}
      replacing-merge: ${AUDIT_CH_REPLACING_MERGE:false}
      replacing-merge-migrate-on-startup: ${AUDIT_CH_REPLACING_MERGE_MIGRATE:false}
      migration-batch-size: ${AUDIT_CH_MIGRATION_BATCH_SIZE:10000}
      migration-resume-enabled: ${AUDIT_CH_MIGRATION_RESUME:true}
      migration-lock-ttl-seconds: ${AUDIT_CH_MIGRATION_LOCK_TTL:300}
    timeline:
      fallback-to-hot: ${TIMELINE_FALLBACK_TO_HOT:true}
    timeline-sync:
      enabled: ${TIMELINE_SYNC_ENABLED:false}
      interval-ms: ${TIMELINE_SYNC_INTERVAL_MS:60000}
      batch-size: ${TIMELINE_SYNC_BATCH_SIZE:200}
    nats:
      enabled: ${AUDIT_NATS_ENABLED:false}
      url: ${NATS_URL:nats://localhost:4222}
      subject: ${AUDIT_NATS_SUBJECT:sentinel.audit.events}
      stream: ${AUDIT_NATS_STREAM:SENTINEL_AUDIT}
      durable: ${AUDIT_NATS_DURABLE:audit-writer}
      batch-size: ${AUDIT_NATS_BATCH_SIZE:50}
      max-in-flight: ${AUDIT_NATS_MAX_IN_FLIGHT:2}
      fetch-timeout-ms: ${AUDIT_NATS_FETCH_TIMEOUT_MS:2000}
      backlog-backoff-ms: ${AUDIT_NATS_BACKLOG_BACKOFF_MS:500}
      max-stream-bytes: ${AUDIT_NATS_MAX_STREAM_BYTES:0}
      max-deliver: ${AUDIT_NATS_MAX_DELIVER:5}
      dlq-stream: ${AUDIT_NATS_DLQ_STREAM:SENTINEL_AUDIT_DLQ}
      dlq-subject: ${AUDIT_NATS_DLQ_SUBJECT:sentinel.audit.events.dlq}
  admin:
    ws:
      limits:
        max-connections-per-tenant: ${WS_MAX_CONNECTIONS_PER_TENANT:10}
        max-connections-global: ${WS_MAX_CONNECTIONS_GLOBAL:100}
        max-events-per-second-per-tenant: ${WS_MAX_EVENTS_PER_SECOND:50}
      plan-quotas:
        enabled: ${WS_PLAN_QUOTAS_ENABLED:true}
        tiers:
          starter:
            max-connections: ${WS_PLAN_STARTER_CONNECTIONS:5}
            max-events-per-second: ${WS_PLAN_STARTER_EVENTS_PER_SECOND:20}
          business:
            max-connections: ${WS_PLAN_BUSINESS_CONNECTIONS:20}
            max-events-per-second: ${WS_PLAN_BUSINESS_EVENTS_PER_SECOND:50}
          enterprise:
            max-connections: ${WS_PLAN_ENTERPRISE_CONNECTIONS:100}
            max-events-per-second: ${WS_PLAN_ENTERPRISE_EVENTS_PER_SECOND:200}
      plan-approval:
        enabled: ${WS_PLAN_APPROVAL_ENABLED:true}
        auto-approve-downgrade: ${WS_PLAN_AUTO_APPROVE_DOWNGRADE:true}
        required-approvals: ${WS_PLAN_REQUIRED_APPROVALS:2}
      plan-billing:
        enabled: ${WS_PLAN_BILLING_ENABLED:true}
        currency: ${WS_PLAN_BILLING_CURRENCY:CNY}
        monthly-price-cents:
          starter: ${WS_PLAN_PRICE_STARTER_CENTS:0}
          business: ${WS_PLAN_PRICE_BUSINESS_CENTS:29900}
          enterprise: ${WS_PLAN_PRICE_ENTERPRISE_CENTS:99900}
      billing-webhook:
        enabled: ${WS_PLAN_BILLING_WEBHOOK_ENABLED:false}
        url: ${WS_PLAN_BILLING_WEBHOOK_URL:}
        secret: ${WS_PLAN_BILLING_WEBHOOK_SECRET:}
      broadcast:
        enabled: ${WS_BROADCAST_NATS_ENABLED:false}
        url: ${NATS_URL:nats://localhost:4222}
        subject: ${WS_BROADCAST_NATS_SUBJECT:sentinel.admin.ws.events}
  client-events:
    nats:
      enabled: ${CLIENT_EVENTS_NATS_ENABLED:false}
      url: ${NATS_URL:nats://localhost:4222}
      subject: ${CLIENT_EVENTS_NATS_SUBJECT:sentinel.client.events}
      stream: ${CLIENT_EVENTS_NATS_STREAM:SENTINEL_CLIENT_EVENTS}
      durable: ${CLIENT_EVENTS_NATS_DURABLE:client-events-writer}
      batch-size: ${CLIENT_EVENTS_NATS_BATCH_SIZE:100}
      max-in-flight: ${CLIENT_EVENTS_NATS_MAX_IN_FLIGHT:3}
      fetch-timeout-ms: ${CLIENT_EVENTS_NATS_FETCH_TIMEOUT_MS:2000}
      backlog-backoff-ms: ${CLIENT_EVENTS_NATS_BACKLOG_BACKOFF_MS:500}
      max-stream-bytes: ${CLIENT_EVENTS_NATS_MAX_STREAM_BYTES:0}
      max-deliver: ${CLIENT_EVENTS_NATS_MAX_DELIVER:5}
      dlq-stream: ${CLIENT_EVENTS_NATS_DLQ_STREAM:SENTINEL_CLIENT_EVENTS_DLQ}
      dlq-subject: ${CLIENT_EVENTS_NATS_DLQ_SUBJECT:sentinel.client.events.dlq}
